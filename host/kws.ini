# iCE40 KWS Accelerator - host configuration
# CLI options override these values.

# Serial link. On the iCEBreaker the UART is the SECOND FTDI channel
# (COMn+1 on Windows, /dev/ttyUSB1 on Linux).
port = COM7
baud = 115200

# Audio source: mic | wav:<path> | synth
input = mic

# Stop after N seconds (0 = run until Ctrl+C)
duration_s = 0

# Poll FPGA statistics every N seconds (0 = off)
stats_interval_s = 10

# Run the bit-accurate software reference model on the same feature stream
# and report agreement with FPGA detections.
check = 1

# Logging
verbose = 0
log_file =

# MFCC quantization: INT8 units per standard deviation
quant_scale = 20.0

# Class labels (index order must match the trained model)
labels = silence,unknown,yes,no
