# -----------------------------------------------------------------------------
# Project : iCE40 KWS Accelerator
# File    : ci.yml
# Purpose : Full continuous integration: lint, complete Verilator regression
#           (bit-accurate against the C reference model), FPGA implementation
#           through bitstream with timing sign-off, and host application build.
# -----------------------------------------------------------------------------
name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Verilator lint (-Wall)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: YosysHQ/setup-oss-cad-suite@v3
      - run: make lint

  regression:
    name: Simulation regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: YosysHQ/setup-oss-cad-suite@v3
      - run: make sim
      - name: Archive waveforms on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sim-artifacts
          path: sim/out/*.vcd
          if-no-files-found: ignore

  implementation:
    name: Synthesis + PnR + timing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: YosysHQ/setup-oss-cad-suite@v3
      - run: make bit time
      - name: Timing sign-off summary
        run: |
          grep "Max frequency" build/nextpnr.log | tail -n 2
          grep "Total path delay" build/icetime.rpt
      - uses: actions/upload-artifact@v4
        with:
          name: bitstream
          path: |
            build/kws.bin
            build/nextpnr_report.json
            build/icetime.rpt

  host:
    name: Host application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make host
      - run: ./host/build/kws_host --help

  weights:
    name: Weight tooling is deterministic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The checked-in weights/ holds the TRAINED deployment set (provenance
      # in weights/model_params.json). The bring-up generator must remain a
      # working, deterministic fallback: two runs must agree byte-for-byte.
      - name: Bring-up generator determinism
        run: |
          python3 model/gen_weights.py --out /tmp/w1
          python3 model/gen_weights.py --out /tmp/w2
          diff -r -q /tmp/w1 /tmp/w2
      - name: Checked-in artifact set is complete
        run: |
          for f in conv_weights.mem dense_weights.mem conv_bias.mem \
                   dense_bias.mem selftest_frames.mem kws_weights.h \
                   model_params.json; do
            test -f "weights/$f" || { echo "missing weights/$f"; exit 1; }
          done
